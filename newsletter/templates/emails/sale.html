<h2>Акции и скидки</h2>

{% for p in products %}
<div style="border: 2px solid red; padding: 10px">
    <img
        src="{{ p.image }}"
        width="250"
    />

    <h3>{{ p.name }}</h3>
    <p><b>Цена по акции: {{ p.price }} ₽</b></p>
    <a
        href="https://grandfayans.ru/catalog/mebel-po-kollektsiyam/80-zerkalo-shkaf-paola-80_1/
"
        >Перейти на страницу товара</a
    >
</div>
<div style="margin-top: 20px; margin-bottom: 20px">
    <a
        style="
            padding: 16px;
            background-color: rgb(231, 54, 54);
            color: white;
            text-decoration: none;
            border-radius: 5px;
        "
        href="{{ unsubscribe_url }}"
    >
        Отписаться от рассылки
    </a>
</div>

{% endfor %}
